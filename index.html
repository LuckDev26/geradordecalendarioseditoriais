  <style>
    :root{
      --bg:#333333; --panel:#3b3b3b; --panel2:#444; --text:#FCFAF9;

    }
    *{box-sizing:border-box}
    body{
      margin:0; min-height:100vh; color:var(--text);
      background:
        radial-gradient(circle at 8% 0%,rgba(72,229,194,.22),transparent 32%),
        radial-gradient(circle at 100% 92%,rgba(177,253,100,.14),transparent 34%),

    }
    h1,h2,h3,h4,.brand-name,.title-font,.metric strong{font-family:"Space Grotesk",ui-sans-serif,system-ui,sans-serif;letter-spacing:-.045em}
    button,input,textarea,select{font:inherit} button{cursor:pointer} p,small,input,textarea,select,.muted{font-weight:400}
    .app{display:grid;grid-template-columns:286px 1fr;min-height:100vh}
    .sidebar{position:sticky;top:0;height:100vh;padding:24px 18px;background:rgba(20,20,20,.28);border-right:1px solid var(--line);backdrop-filter:blur(18px);display:flex;flex-direction:column;gap:24px}

    .nav{display:grid;gap:8px}

    .nav button:hover{background:rgba(255,255,255,.06);color:var(--text)}
    .nav button.active{background:var(--gradient);color:#151515;font-weight:700}
    .ico,.nav-ico,.btn-ico{width:18px;height:18px;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0}

    .nav button.active .nav-ico,.btn.primary .btn-ico{color:#151515}
    .card-ico{width:42px;height:42px;border-radius:15px;background:var(--soft-gradient);border:1px solid rgba(72,229,194,.22);color:var(--accent);padding:10px;display:inline-flex;align-items:center;justify-content:center}
    .card-ico svg{width:100%;height:100%}

    .main{width:min(1500px,100%);margin:0 auto;padding:30px}
    .topbar{display:flex;justify-content:space-between;gap:20px;align-items:flex-start;margin-bottom:22px}

    .actions{display:flex;gap:10px;flex-wrap:wrap;justify-content:flex-end}.export-actions{justify-content:center;align-items:center;margin-top:20px;min-height:170px}.export-actions .btn{min-width:136px}
    .btn{position:relative;isolation:isolate;overflow:hidden;border:1px solid rgba(255,255,255,.11);color:var(--text);background:linear-gradient(180deg,rgba(255,255,255,.10),rgba(255,255,255,.045));border-radius:16px;padding:11px 15px;display:inline-flex;align-items:center;justify-content:center;gap:9px;text-decoration:none;transition:transform .2s ease,background .2s ease,border-color .2s ease,box-shadow .2s ease,color .2s ease;min-height:44px;font-weight:600;letter-spacing:-.01em;box-shadow:0 10px 24px rgba(0,0,0,.16),inset 0 1px 0 rgba(255,255,255,.05);white-space:nowrap}
    .btn:before{content:'';position:absolute;inset:0;border-radius:inherit;background:linear-gradient(135deg,rgba(255,255,255,.06),transparent 45%,rgba(72,229,194,.06));opacity:.9;z-index:-1}
    .btn:hover{transform:translateY(-2px);background:linear-gradient(180deg,rgba(255,255,255,.14),rgba(255,255,255,.06));border-color:rgba(72,229,194,.24);box-shadow:0 14px 34px rgba(0,0,0,.24),0 0 0 1px rgba(72,229,194,.05) inset}

    .btn.small{padding:8px 14px;border-radius:13px;font-size:.84rem;min-height:38px;font-weight:600;gap:8px}

    .grid{display:grid;gap:16px}.cols-2{grid-template-columns:repeat(2,minmax(0,1fr))}.cols-3{grid-template-columns:repeat(3,minmax(0,1fr))}.cols-4{grid-template-columns:repeat(4,minmax(0,1fr))}

    .hero{position:relative;overflow:hidden;padding:clamp(24px,4vw,42px);min-height:335px;display:grid;grid-template-columns:1.12fr .88fr;gap:24px;align-items:center;background:radial-gradient(circle at 12% 18%,rgba(72,229,194,.22),transparent 28%),radial-gradient(circle at 90% 8%,rgba(177,253,100,.16),transparent 27%),linear-gradient(180deg,rgba(255,255,255,.10),rgba(255,255,255,.045))}
    .hero h2{font-size:clamp(2.1rem,4vw,4.3rem);line-height:.9;margin:16px 0}.hero p{color:var(--muted);line-height:1.65;max-width:680px}
    .hero-panel{border:1px solid var(--line);background:rgba(0,0,0,.18);border-radius:26px;padding:18px}.hero-row{display:flex;justify-content:space-between;gap:12px;align-items:center;border-bottom:1px solid var(--line);padding:14px 0}.hero-row:first-child{padding-top:0}.hero-row:last-child{border-bottom:0;padding-bottom:0}.hero-row small{display:block;color:var(--muted);margin-top:4px}
    .metric{min-height:130px;display:flex;flex-direction:column;justify-content:space-between;position:relative;overflow:hidden}.metric:after{content:"";position:absolute;width:120px;height:120px;border-radius:999px;right:-42px;top:-42px;background:rgba(72,229,194,.14)}.metric span{color:var(--muted);font-size:.84rem}.metric strong{font-size:2.25rem}

    .field{display:grid;gap:8px}.field label{font-size:.72rem;color:var(--muted2);text-transform:uppercase;letter-spacing:.15em;font-weight:900}
    input,textarea,select{width:100%;border:1px solid var(--line);background:rgba(0,0,0,.18);color:var(--text);border-radius:16px;padding:12px 13px;outline:none;transition:.2s ease}
    textarea{min-height:106px;resize:vertical;line-height:1.55}input:focus,textarea:focus,select:focus{border-color:rgba(72,229,194,.70);box-shadow:0 0 0 4px rgba(72,229,194,.09)}option{color:#161616}
    .list-item.active{border-color:rgba(72,229,194,.55);background:rgba(72,229,194,.09)}.persona-tools{display:flex;gap:10px;flex-wrap:wrap}.persona-type{margin-top:8px}.empty-state{border:1px dashed rgba(255,255,255,.16);border-radius:18px;padding:18px;color:var(--muted);background:rgba(255,255,255,.035)}.list{display:grid;gap:10px}.list-item{border:1px solid var(--line);background:rgba(0,0,0,.13);border-radius:18px;padding:14px;display:flex;justify-content:space-between;align-items:center;gap:12px;transition:.18s ease}.list-item:hover{background:rgba(255,255,255,.065)}.list-item strong{display:block;font-size:.98rem}.list-item small{display:block;color:var(--muted);margin-top:4px;line-height:1.35}.list-item .btn{flex-shrink:0}

    .step-top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:14px}.step-top .card-ico{margin:0;flex-shrink:0}.step-tag{display:inline-flex;margin-top:2px;margin-left:auto;border-radius:14px;padding:9px 13px;font-size:.78rem;font-weight:900;letter-spacing:.01em;align-self:flex-start}
    .muted{color:var(--muted);line-height:1.55}
    .template-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px}.template-card h3{margin:12px 0 6px}.template-card p{color:var(--muted);line-height:1.48;font-size:.9rem;min-height:54px}

    .post-row{display:grid;grid-template-columns:105px 118px 1fr auto;gap:12px;align-items:center}.prompt-box,.import-box{white-space:pre-wrap;background:rgba(0,0,0,.22);border:1px solid var(--line);border-radius:18px;padding:18px;color:rgba(252,250,249,.88);line-height:1.55;max-height:560px;overflow:auto;font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;font-size:.86rem}

    .print-area{display:none}

function notify(msg='Pronto!',type='success'){
  const wrap=document.getElementById('toastContainer');
  if(!wrap)return;
  const item=document.createElement('div');
  item.className=`toast-item ${type}`;
  item.innerHTML=`<span class="toast-dot"></span><span>${esc(msg)}</span>`;
  wrap.appendChild(item);
  setTimeout(()=>{item.style.opacity='0';item.style.transform='translateY(10px) scale(.98)';},2600);
  setTimeout(()=>item.remove(),3000);
}

function setCalendarPersona(id){
  const c=calendar(); if(!c)return;
  c.personaId=id;
  const mix=ensurePersonaMix(c);
  if(id && !mix.some(item=>item.id===id)) mix.unshift({id,weight:100});
  save(); render();
}
function togglePersonaMix(id){
  const c=calendar(); if(!c)return;
  const mix=ensurePersonaMix(c);
  const idx=mix.findIndex(item=>item.id===id);
  if(idx>=0){mix.splice(idx,1)}
  else{mix.push({id,weight:mix.length?30:100})}
  if(!mix.length)c.personaId='';
  else if(!mix.some(item=>item.id===c.personaId))c.personaId=mix[0].id;
  save(); render();
}
function setPersonaMixWeight(id,value){

}

function openClient(id){selectedClientId=id;active='clients';render();notify('Cadastro aberto para edição.')}
function openPersona(id){const p=persona(id);if(p){selectedPersonaId=id;selectedPersonaClientId=p.clientId;active='personas';render();notify('Persona aberta para edição.')}}
function viewDashboard(){title('Dashboard','Painel de trabalho para organizar clientes, personas, calendários editoriais e exportações.');const posts=data.calendars.reduce((a,c)=>a+(c.posts||[]).length,0);const c=calendar();const cl=c?client(c.clientId):null;return `<div class="card hero"><div><span class="tag accent">Fluxo de trabalho</span><h2>Painel de planejamento da ConnectPixel.</h2><p>Siga o fluxo começando pelo cliente, depois persona, calendário, geração com IA, revisão dos cards e exportação final.</p><div class="actions" style="justify-content:flex-start;margin-top:18px"><button class="btn primary" onclick="go('planner')">${icon('calendar','btn-ico')}Criar calendário</button><button class="btn" onclick="go('personas')">${icon('target','btn-ico')}Gerar persona</button><button class="btn" onclick="go('prompt')">${icon('sparkles','btn-ico')}Copiar prompt</button></div></div><div class="hero-panel"><div class="hero-row"><div><strong>Cliente ativo</strong><small>${esc(cl?.name||'Nenhum cliente definido')}</small></div>${icon('users','card-ico')}</div><div class="hero-row"><div><strong>Persona + objeções</strong><small>Base para criar conteúdo menos genérico</small></div>${icon('target','card-ico')}</div><div class="hero-row"><div><strong>PDF premium</strong><small>Entrega visual para aprovação do cliente</small></div>${icon('file','card-ico')}</div></div></div><div class="section-head"><div><h2>Como usar em 7 passos</h2><p>Fluxo recomendado para criar um planejamento mais estratégico antes de gerar os conteúdos.</p></div></div><div class="grid cols-4"><div class="card soft hoverable"><div class="step-top">${icon('users','card-ico')}<span class="tag accent step-tag">Passo 1</span></div><h3>Cadastre o cliente</h3><p class="muted">Preencha nome, segmento, cidade, produtos, tom de voz e observações.</p><button class="btn small" onclick="go('clients')">Abrir clientes</button></div><div class="card soft hoverable"><div class="step-top">${icon('target','card-ico')}<span class="tag accent step-tag">Passo 2</span></div><h3>Crie a persona</h3><p class="muted">Defina dores, desejos, objeções, linguagem e pontos de confiança do público.</p><button class="btn small" onclick="go('personas')">Abrir persona</button></div><div class="card soft hoverable"><div class="step-top">${icon('calendar','card-ico')}<span class="tag accent step-tag">Passo 3</span></div><h3>Crie o calendário</h3><p class="muted">Escolha mês, quantidade de posts, formatos, objetivo principal e persona ativa.</p><button class="btn small" onclick="go('planner')">Abrir calendário</button></div><div class="card soft hoverable"><div class="step-top">${icon('layers','card-ico')}<span class="tag accent step-tag">Passo 4</span></div><h3>Aplique um nicho</h3><p class="muted">Use um modelo pronto, como Contabilidade, Clínica, Loja, Pousada ou Internet.</p><button class="btn small" onclick="go('planner')">Ver modelos</button></div><div class="card soft hoverable"><div class="step-top">${icon('sparkles','card-ico')}<span class="tag accent step-tag">Passo 5</span></div><h3>Copie o prompt</h3><p class="muted">Cole no ChatGPT e peça a resposta em JSON para importar de volta.</p><button class="btn small" onclick="go('prompt')">Copiar prompt</button></div><div class="card soft hoverable"><div class="step-top">${icon('upload','card-ico')}<span class="tag accent step-tag">Passo 6</span></div><h3>Importe a resposta</h3><p class="muted">Cole o JSON gerado e transforme tudo em cards editáveis.</p><button class="btn small" onclick="go('prompt')">Importar JSON</button></div><div class="card soft hoverable"><div class="step-top">${icon('filter','card-ico')}<span class="tag accent step-tag">Passo 7</span></div><h3>Edite e filtre</h3><p class="muted">Use filtros por status, formato e busca para revisar o planejamento.</p><button class="btn small" onclick="go('planner')">Editar posts</button></div><div class="card soft hoverable"><div class="step-top">${icon('print','card-ico')}<span class="tag accent step-tag">Final</span></div><h3>Gere o PDF</h3><p class="muted">Exporte o material e copie a mensagem curta para enviar no WhatsApp.</p><button class="btn small primary" onclick="go('export')">Exportar</button></div></div><div class="section-head"><div><h2>Resumo do sistema</h2><p>Resumo geral dos planejamentos cadastrados.</p></div></div><div class="grid cols-4"><div class="card metric">${icon('users','card-ico')}<span>Clientes cadastrados</span><strong>${data.clients.length}</strong></div><div class="card metric">${icon('target','card-ico')}<span>Personas criadas</span><strong>${data.personas.length}</strong></div><div class="card metric">${icon('calendar','card-ico')}<span>Calendários</span><strong>${data.calendars.length}</strong></div><div class="card metric">${icon('layers','card-ico')}<span>Posts planejados</span><strong>${posts}</strong></div></div><div class="section-head"><div><h2>Modelos rápidos por nicho</h2><p>Escolha um modelo inicial e personalize conforme o cliente.</p></div></div>${templateGrid()}<div class="section-head"><div><h2>Calendário ativo</h2><p>${c?`${esc(cl?.name||'Sem cliente')} • ${esc(c.month)}`:'Nenhum calendário criado.'}</p></div><button class="btn" onclick="go('prompt')">${icon('sparkles','btn-ico')}Gerar prompt</button></div>${c?summaryCard(c):''}`}
function summaryCard(c){const cl=client(c.clientId),pe=persona(c.personaId);return `<div class="card"><div class="grid cols-3"><div>${icon('users','card-ico')}<span class="tag">Cliente</span><h3>${esc(cl?.name||'Não definido')}</h3><p class="muted">${esc(cl?.segment||'')}</p></div><div>${icon('target','card-ico')}<span class="tag">Persona</span><h3>${esc(pe?.name||'Não definida')}</h3><p class="muted">${esc(pe?.age||'')}</p></div><div>${icon('layers','card-ico')}<span class="tag">Posts</span><h3>${c.posts.length} conteúdos</h3><p class="muted">${esc(c.objective||'Objetivo ainda não definido.')}</p></div></div></div>`}
function templateGrid(){return `<div class="template-grid">${nicheTemplates.map(t=>`<div class="card soft template-card hoverable">${icon(t.icon,'card-ico')}<h3>${esc(t.title)}</h3><p>${esc(t.desc)}</p><button class="btn small primary" onclick="applyTemplate('${t.key}')">${icon('plus','btn-ico')}Aplicar modelo</button></div>`).join('')}</div>`}
function applyTemplate(key){const t=nicheTemplates.find(x=>x.key===key),c=calendar();if(!t||!c)return;let cl=client(c.clientId);if(!cl){cl=emptyClient();data.clients.unshift(cl);c.clientId=cl.id}if(!cl.segment)cl.segment=t.segment;c.objective=t.objective;c.pillars=t.pillars;c.formats=t.formats;c.strategicSummary=`Este calendário foi estruturado para o nicho ${t.title}, priorizando ${t.pillars.toLowerCase()}. A comunicação deve conectar dores reais da persona com conteúdos práticos, visuais e fáceis de aprovar.`;let p=c.personaId?persona(c.personaId):null;if(!p){p=emptyPersona(cl.id);data.personas.unshift(p);c.personaId=p.id}Object.assign(p,t.persona,{id:p.id,clientId:cl.id,type:p.type||'Principal',fears:p.fears||'Receber um atendimento ruim, pagar por algo que não resolve ou se arrepender da escolha.',motivations:p.motivations||t.persona.trust,funnelStage:p.funnelStage||'Meio de funil, com necessidade de confiança antes da conversão.'});c.personaId=p.id;c.personaMix=[{id:p.id,weight:100}];selectedPersonaClientId=cl.id;selectedPersonaId=p.id;save();render();notify('Modelo aplicado!')}
function viewClients(){
  title('Clientes','Cadastre, selecione e edite os clientes antes de criar personas e calendários.');
  if(!data.clients.length){const nc=emptyClient();data.clients.push(nc);selectedClientId=nc.id;save()}
  if(!selectedClientId||!client(selectedClientId)) selectedClientId=data.clients[0]?.id||'';
  const c=client(selectedClientId);
  return `<div class="section-head"><div><h2>Clientes</h2><p>Selecione um cliente na lista para editar o cadastro.</p></div><button class="btn primary" onclick="addClient()">${icon('plus','btn-ico')}Novo cliente</button></div>
  <div class="split">
    <div class="card">
      <div class="list">${data.clients.map(item=>`<div class="list-item ${selectedClientId===item.id?'active':''}"><div><strong>${esc(item.name||'Cliente sem nome')}</strong><small>${esc(item.segment||'Sem segmento')} • ${data.personas.filter(p=>p.clientId===item.id).length} persona(s)</small></div><div class="actions"><button class="btn small" onclick="openClient('${item.id}')">${icon('edit','btn-ico')}Editar</button><button class="btn small danger" onclick="deleteClient('${item.id}')">${icon('trash','btn-ico')}Excluir</button></div></div>`).join('')}</div>
    </div>
    <div class="card">
      <div class="section-head" style="margin-top:0"><div><h2>${esc(c?.name||'Cliente sem nome')}</h2><p>Edite os dados e clique em salvar cadastro.</p></div><button class="btn small primary" onclick="confirmSave('Cadastro do cliente salvo!')">${icon('check','btn-ico')}Salvar cadastro</button></div>
      <div class="grid cols-2">
        ${field('Nome da empresa',c.name,`setField('clients','${c.id}','name',this.value)`)}
        ${field('Segmento',c.segment,`setField('clients','${c.id}','segment',this.value)`)}
        ${field('Cidade/região',c.city,`setField('clients','${c.id}','city',this.value)`)}
        ${field('Instagram',c.instagram,`setField('clients','${c.id}','instagram',this.value)`)}
        ${field('WhatsApp',c.whatsapp,`setField('clients','${c.id}','whatsapp',this.value)`)}
        ${field('Tom de voz',c.tone,`setField('clients','${c.id}','tone',this.value)`)}
      </div>
      <div class="grid cols-2" style="margin-top:16px">
        ${field('Produtos/serviços',c.products,`setField('clients','${c.id}','products',this.value)`,true)}
        ${field('Observações estratégicas',c.notes,`setField('clients','${c.id}','notes',this.value)`,true)}
      </div>
    </div>
  </div>`;
}
function addClient(){const c=emptyClient();data.clients.unshift(c);selectedClientId=c.id;selectedPersonaClientId=c.id;save();render();notify('Novo cliente criado. Preencha e salve.')} 
function deleteClient(id){askConfirm('Excluir este cliente? Isso também remove as personas desse cliente.',()=>{data.clients=data.clients.filter(c=>c.id!==id);data.personas=data.personas.filter(p=>p.clientId!==id);data.calendars=data.calendars.filter(c=>c.clientId!==id);if(selectedClientId===id)selectedClientId=data.clients[0]?.id||'';if(selectedPersonaClientId===id)selectedPersonaClientId=data.clients[0]?.id||'';if(!data.calendars.find(c=>c.id===data.activeCalendarId))data.activeCalendarId=data.calendars[0]?.id||'';save();render();notify('Cliente excluído.','warn')})}
function viewPersonas(){
  title('Personas','Crie várias personas por cliente, defina o tipo de cada uma e edite separadamente.');
  if(!data.clients.length){const nc=emptyClient();data.clients.push(nc);selectedPersonaClientId=nc.id;save()}
  if(!selectedPersonaClientId||!client(selectedPersonaClientId)) selectedPersonaClientId=data.clients[0]?.id||'';
  const cl=client(selectedPersonaClientId);
  const list=data.personas.filter(p=>p.clientId===selectedPersonaClientId);
  if(selectedPersonaId&&!list.find(p=>p.id===selectedPersonaId)) selectedPersonaId=list[0]?.id||'';
  const current=selectedPersonaId?persona(selectedPersonaId):null;
  const typeOptions=['Principal','Secundária','Oportunidade'];
  return `<div class="section-head"><div><h2>Personas por cliente</h2><p>Escolha um cliente, crie até 3 personas e marque se ela é principal, secundária ou de oportunidade.</p></div><button class="btn primary" onclick="addPersona()">${icon('plus','btn-ico')}Nova persona</button></div>
  <div class="split">
    <div class="card">
      <div class="section-head" style="margin-top:0"><div><h2>Clientes</h2><p>Filtre a lista de personas por cliente.</p></div></div>
      <div class="list">${data.clients.map(item=>`<div class="list-item ${selectedPersonaClientId===item.id?'active':''}"><div><strong>${esc(item.name||'Cliente sem nome')}</strong><small>${data.personas.filter(p=>p.clientId===item.id).length} persona(s) cadastrada(s)</small></div><button class="btn small" onclick="selectedPersonaClientId='${item.id}';selectedPersonaId='';render()">${icon('users','btn-ico')}Ver personas</button></div>`).join('')}</div>
    </div>
    <div class="grid">
      <div class="card">
        <div class="section-head" style="margin-top:0"><div><h2>${esc(cl?.name||'Cliente sem nome')}</h2><p>Personas vinculadas a este cliente.</p></div><button class="btn primary" onclick="addPersona()">${icon('plus','btn-ico')}Criar persona</button></div>
        <div class="grid cols-3">${list.map(p=>`<div class="card soft hoverable"><span class="tag accent">${esc(p.type||'Principal')}</span><h3>${esc(p.name||'Persona sem nome')}</h3><p class="muted">${esc(p.age||'Faixa etária não definida')}</p><div class="persona-tools"><button class="btn small" onclick="openPersona('${p.id}')">${icon('edit','btn-ico')}Editar</button><button class="btn small" onclick="copyText(buildPersonaPrompt('${p.id}'))">${icon('copy','btn-ico')}Prompt</button><button class="btn small danger" onclick="deletePersona('${p.id}')">${icon('trash','btn-ico')}Excluir</button></div></div>`).join('')||'<div class="empty-state">Nenhuma persona para este cliente ainda. Clique em “Criar persona”.</div>'}</div>
      </div>
      ${current?personaEditor(current,typeOptions):'<div class="card empty-state">Selecione uma persona para editar ou crie uma nova.</div>'}
    </div>
  </div>`;
}
function personaEditor(p,typeOptions){
  return `<div class="card">
    <div class="section-head" style="margin-top:0"><div><h2>Editar persona</h2><p>${esc(client(p.clientId)?.name||'Cliente sem vínculo')}</p></div><button class="btn small primary" onclick="confirmSave('Persona salva!')">${icon('check','btn-ico')}Salvar persona</button></div>
    <div class="grid cols-2">
      <div class="field"><label>Cliente vinculado</label><select onchange="setField('personas','${p.id}','clientId',this.value,true);selectedPersonaClientId=this.value"><option value="">Selecionar cliente</option>${data.clients.map(c=>`<option value="${c.id}" ${p.clientId===c.id?'selected':''}>${esc(c.name||'Cliente sem nome')}</option>`).join('')}</select></div>
      <div class="field"><label>Tipo de persona</label><select onchange="setField('personas','${p.id}','type',this.value,true)">${typeOptions.map(t=>`<option value="${t}" ${(p.type||'Principal')===t?'selected':''}>${t}</option>`).join('')}</select></div>
      ${field('Nome da persona',p.name,`setField('personas','${p.id}','name',this.value)`)}
      ${field('Faixa etária',p.age,`setField('personas','${p.id}','age',this.value)`)}
      ${field('Etapa do funil',p.funnelStage,`setField('personas','${p.id}','funnelStage',this.value)`)}
    </div>
    <div class="grid cols-3" style="margin-top:16px">
      ${field('Rotina',p.routine,`setField('personas','${p.id}','routine',this.value)`,true)}
      ${field('Dores',p.pains,`setField('personas','${p.id}','pains',this.value)`,true)}
      ${field('Desejos',p.desires,`setField('personas','${p.id}','desires',this.value)`,true)}
      ${field('Objeções',p.objections,`setField('personas','${p.id}','objections',this.value)`,true)}
      ${field('Medos',p.fears,`setField('personas','${p.id}','fears',this.value)`,true)}
      ${field('Motivações',p.motivations,`setField('personas','${p.id}','motivations',this.value)`,true)}
      ${field('Linguagem ideal',p.language,`setField('personas','${p.id}','language',this.value)`,true)}
      ${field('Conteúdos que chamam atenção',p.contentHooks,`setField('personas','${p.id}','contentHooks',this.value)`,true)}
      ${field('O que gera confiança',p.trust,`setField('personas','${p.id}','trust',this.value)`,true)}
    </div>
  </div>`;
}
function addPersona(){const cid=selectedPersonaClientId||selectedClientId||data.clients[0]?.id||'';const p=emptyPersona(cid);p.name='Nova persona';data.personas.unshift(p);selectedPersonaClientId=cid;selectedPersonaId=p.id;save();render();notify('Nova persona criada. Edite e salve.')} 
function deletePersona(id){askConfirm('Excluir esta persona?',()=>{data.personas=data.personas.filter(p=>p.id!==id);data.calendars.forEach(c=>{if(c.personaId===id)c.personaId=''});if(selectedPersonaId===id)selectedPersonaId=data.personas.find(p=>p.clientId===selectedPersonaClientId)?.id||'';save();render();notify('Persona excluída.','warn')})}
function filteredPosts(c){return(c.posts||[]).filter(p=>{const s=!filters.status||p.status===filters.status;const f=!filters.format||p.format===filters.format;const q=filters.search.trim().toLowerCase();const ok=!q||[p.date,p.format,p.theme,p.headline,p.objective,p.caption,p.cta,p.visual,p.status,p.responsible].join(' ').toLowerCase().includes(q);return s&&f&&ok})}
function viewPlanner(){title('Calendário Editorial','Configure o mês, aplique modelos, filtre conteúdos e edite cada card antes de exportar.');const c=calendar();if(!c)return `<div class="card"><h2>Nenhum calendário criado.</h2><button class="btn primary" onclick="addCalendar()">${icon('plus','btn-ico')}Criar calendário</button></div>`;const posts=filteredPosts(c);return `<div class="section-head"><div><h2>Configurações do calendário</h2><p>Escolha cliente, persona, mês, objetivo e pilares.</p></div><div class="actions"><button class="btn primary" onclick="confirmSave('Calendário salvo!')">${icon('check','btn-ico')}Salvar</button><button class="btn" onclick="addCalendar()">${icon('plus','btn-ico')}Novo calendário</button></div></div><div class="card"><div class="grid cols-3"><div class="field"><label>Calendário ativo</label><select onchange="data.activeCalendarId=this.value;update()">${data.calendars.map(x=>`<option value="${x.id}" ${x.id===c.id?'selected':''}>${esc(client(x.clientId)?.name||'Sem cliente')} • ${esc(x.month)}</option>`).join('')}</select></div><div class="field"><label>Cliente</label><select onchange="setCal('clientId',this.value);const c=calendar();c.personaId='';c.personaMix=[];save();render()">${data.clients.map(x=>`<option value="${x.id}" ${x.id===c.clientId?'selected':''}>${esc(x.name||'Cliente sem nome')}</option>`).join('')}</select></div><div class="field"><label>Persona principal</label><select onchange="setCalendarPersona(this.value)"><option value="">Selecionar</option>${data.personas.filter(p=>!c.clientId||p.clientId===c.clientId).map(x=>`<option value="${x.id}" ${x.id===c.personaId?'selected':''}>${esc(x.name||'Persona sem nome')} — ${esc(x.type||'Principal')}</option>`).join('')}</select></div>${field('Mês',c.month,`setCal('month',this.value)`,false,'month')}<div class="field"><label>Total automático</label><input type="number" value="${c.quantity||0}" readonly></div>${field('Formatos',c.formats,`setCal('formats',this.value)`)}</div><div class="grid cols-3" style="margin-top:16px">${field('Objetivo do mês',c.objective,`setCal('objective',this.value)`,true)}${field('Pilares de conteúdo',c.pillars,`setCal('pillars',this.value)`,true)}${field('Datas importantes',c.importantDates,`setCal('importantDates',this.value)`,true)}</div><div style="margin-top:16px">${field('Resumo estratégico do mês',c.strategicSummary,`setCal('strategicSummary',this.value)`,true)}</div></div><div class="section-head"><div><h2>Formatos do calendário</h2><p>Separe a quantidade de Reels, Cards, Carrosséis e Stories.</p></div></div>${renderContentMix(c)}<div class="section-head"><div><h2>Detalhes de carrossel e Reels</h2><p>Configure slides, assuntos e direção dos roteiros antes de gerar com IA.</p></div></div><div class="card"><div class="grid cols-2">${field('Slides por carrossel',c.carouselSlidesQty||5,`setCal('carouselSlidesQty',this.value)`,false,'number')}${field('Assuntos dos Cards / Foto única',c.cardTopics||'',`setCal('cardTopics',this.value)`,true)}${field('Assuntos dos carrosséis',c.carouselTopics||'',`setCal('carouselTopics',this.value)`,true)}${field('Direção dos roteiros de Reels',c.reelsDirection||'',`setCal('reelsDirection',this.value)`,true)}</div></div><div class="section-head"><div><h2>Personas do calendário</h2><p>Use uma persona principal ou misture várias personas no mesmo mês.</p></div></div>${renderPersonaMix(c)}<div class="section-head"><div><h2>Modelos por nicho</h2><p>Use uma base pronta de persona, pilares e objetivo.</p></div></div>${templateGrid()}<div class="section-head"><div><h2>Posts do calendário</h2><p>${posts.length} de ${c.posts.length} conteúdos sendo exibidos.</p></div><div class="actions"><button class="btn" onclick="go('prompt')">${icon('sparkles','btn-ico')}Prompt IA</button><button class="btn primary" onclick="addPost()">${icon('plus','btn-ico')}Novo post</button></div></div><div class="card soft">${filterBar()}</div><div class="grid" style="margin-top:12px">${posts.map(p=>`<div class= function filterBar(){return `<div class="filters"><div class="field"><label>Status</label><select onchange="filters.status=this.value;render()"><option value="">Todos</option>${statusList.map(s=>`<option ${filters.status===s?'selected':''}>${s}</option>`).join('')}</select></div><div class="field"><label>Formato</label><select onchange="filters.format=this.value;render()"><option value="">Todos</option>${formatList.map(f=>`<option ${filters.format===f?'selected':''}>${f}</option>`).join('')}</select></div><div class="field"><label>Busca</label><input value="${esc(filters.search)}" oninput="filters.search=this.value;render()" placeholder="Tema, headline, legenda..."></div><button class="btn" onclick="filters.status='';filters.format='';filters.search='';render()">${icon('filter','btn-ico')}Limpar filtros</button></div>`}

      html+=`<div class="print-day ${inMonth?'':'out'} ${dayPosts.length?'has-post':''}">
        <div class="print-day-number">${d.getDate()}</div>
        ${dayPosts.map(p=>`<div class="print-cal-post"><strong>${esc(p.format||'Post')}</strong><span>${esc(p.headline||p.theme||'Conteúdo')}</span></div>`).join('')}
      </div>`;
    }
    return html+'</div>';
  };
  let page=1;
  const pages=[];
  pages.push(`<section class="print-page print-cover">
    <div class="print-watermark"></div>
    <div>
      <div class="print-logo">${logo}</div>
      <h1 class="print-title">Calendário Editorial</h1>
      <p class="print-subtitle">Planejamento estratégico de conteúdo para <strong>${esc(cl.name||'Cliente')}</strong>, referente ao período <strong>${period}</strong>.</p>
    </div>
    <div>
      <div class="print-kicker">ConnectPlanner™ • ConnectPixel</div>
      <div class="print-grid-3">
        <div class="print-card print-stat"><strong>${posts.length}</strong><span>conteúdos planejados</span></div>
        <div class="print-card print-stat"><strong>${mix.length?mix.length:1}</strong><span>persona(s) no planejamento</span></div>
        <div class="print-card print-stat"><strong>${period}</strong><span>mês de execução</span></div>
      </div>
      <div class="print-sign">ConnectPixel</div>
    </div>
    ${footer('Capa do planejamento',page++)}
  </section>`);
  pages.push(`<section class="print-page">
    <div class="print-watermark"></div>
    <div class="print-kicker">Estratégia do mês</div>
    <h2>Resumo estratégico</h2>
    <div class="print-card"><p class="print-muted">${nl(c.strategicSummary||c.objective||'Resumo estratégico não informado.')}</p></div>
    <div class="print-grid">
      <div class="print-card"><h3>Cliente</h3><p><strong>${esc(cl.name||'')}</strong></p><p class="print-muted print-small">${esc(cl.segment||'')}</p><p class="print-muted print-small">${esc(cl.city||'')}</p></div>
      <div class="print-card"><h3>Persona do mês</h3><p><strong>${esc(pe.name||'Não definida')}</strong></p><p class="print-muted print-small">${esc(pe.age||'')}</p><p class="print-muted print-small">${esc(pe.funnelStage||'')}</p></div>
    </div>
    <div class="print-card"><h3>Dores e objeções</h3><p class="print-muted print-small">${nl(pe.pains||'')}</p><p class="print-muted print-small">${nl(pe.objections||'')}</p></div>
    <div class="print-card"><h3>Pilares editoriais</h3><p class="print-muted print-small">${nl(c.pillars||'')}</p></div>
    ${footer('Resumo estratégico',page++)}
  </section>`);
  pages.push(`<section class="print-page">
    <div class="print-watermark"></div>
    <div class="print-kicker">Visão mensal</div>
    <h2>Calendário de postagens</h2>
    ${calendarPage()}
    ${footer('Calendário mensal',page++)}
  </section>`);
  chunks.forEach((chunk,idx)=>{
    pages.push(`<section class="print-page">
      <div class="print-watermark"></div>
      <div class="print-kicker">Conteúdos planejados</div>
      <h2>Postagens ${idx*2+1} a ${idx*2+chunk.length}</h2>
      <div class="print-list">${chunk.map(postCard).join('')}</div>
      ${footer('Calendário editorial',page++)}
    </section>`);
  });
  pages.push(`<section class="print-page print-cover">
    <div class="print-watermark"></div>
    <div>
      <div class="print-logo">${logo}</div>
      <h1 class="print-title">Pronto para aprovação</h1>
      <p class="print-subtitle">Este planejamento pode ser revisado, ajustado e aprovado para seguir para produção.</p>
    </div>
    <div class="print-card"><h3>Próximos passos</h3><p class="print-muted">Revisar ideias, solicitar ajustes necessários e confirmar os conteúdos aprovados para criação das peças, roteiros ou captações.</p></div>
    ${footer('Encerramento',page++)}
  </section>`);
  document.getElementById('printArea').innerHTML=pages.join('');
  setTimeout(()=>window.print(),80);
}

function backup(){const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`connectplanner-backup-${new Date().toISOString().slice(0,10)}.json`;a.click();URL.revokeObjectURL(a.href);notify('Backup JSON baixado!')}
function restore(ev){const file=ev.target.files[0];if(!file)return;const reader=new FileReader();reader.onload=()=>{try{data=JSON.parse(reader.result);save();render();notify('Backup importado!')}catch{notify('Arquivo inválido.','error')}};reader.readAsText(file)}
function resetAll(){askConfirm('Isso vai apagar os dados salvos neste navegador. Continuar?',()=>{data=demo();save();render();notify('Demonstração restaurada.','warn')})}
function uploadLogo(ev){const file=ev.target.files[0];if(!file)return;const reader=new FileReader();reader.onload=()=>{data.logo=reader.result;save();render();notify('Logo aplicada!')};reader.readAsDataURL(file)}
document.getElementById('confirmCancel')?.addEventListener('click',closeConfirm);
document.getElementById('confirmLayer')?.addEventListener('click',e=>{if(e.target.id==='confirmLayer')closeConfirm()});
document.getElementById('confirmOk')?.addEventListener('click',()=>{const fn=pendingConfirm;closeConfirm();if(fn)fn()});
render();
</script>
</body>
</html>
